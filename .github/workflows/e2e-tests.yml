name: BreathTrack E2E Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  e2e-tests:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: breathtrack
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── 1. Checkout Repository ───────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Import MySQL Database Schema ─────────────────────────────────────
      - name: Import Database Schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root breathtrack < "nov19/breathtrack (15).sql"

      # ── 3. Setup PHP 8.2 + Required Extensions ───────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json

      # ── 4. Update Backend DB Config for CI Environment ──────────────────────
      - name: Patch Backend DB Config
        run: |
          sed -i 's|private \$host = "127.0.0.1:3307";|private $host = "127.0.0.1:3306";|g' nov19/config.php

      # ── 5. Start PHP Built-in Server (Backend) ─────────────────────────────
      - name: Start PHP Backend Server
        run: |
          php -S 127.0.0.1:80 -t nov19 &
          echo "PHP backend started on port 80"
          sleep 2

      # ── 6. Setup Node.js + Install Frontend Dependencies ────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: breathtrack-web/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd breathtrack-web
          npm ci

      # ── 7. Patch API Base URL for CI (PHP built-in server on port 80) ───────
      - name: Patch Frontend API Base URL
        run: |
          sed -i "s|http://localhost/nov19|http://127.0.0.1:80|g" breathtrack-web/src/api/apiService.ts

      # ── 8. Start Vite Dev Server (Frontend) ─────────────────────────────────
      - name: Start Vite Dev Server
        run: |
          cd breathtrack-web
          npm run dev &
          echo "Vite server starting..."
          sleep 5
          curl --silent --retry 10 --retry-delay 3 http://localhost:5173 > /dev/null
          echo "Vite server is ready!"

      # ── 9. Setup Python + Install Selenium Dependencies ─────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r e2e-tests/requirements.txt

      # ── 10. Setup Chrome & ChromeDriver ─────────────────────────────────────
      - name: Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      # ── 11. Run Selenium E2E Test Suite ─────────────────────────────────────
      - name: Run E2E Tests
        run: |
          python e2e-tests/run_tests.py
        env:
          DISPLAY: ':99'

      # ── 12. Upload Test Results as Artifact ─────────────────────────────────
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()  # Upload report even if tests fail
        with:
          name: breathtrack-e2e-report-${{ github.run_number }}
          path: e2e-tests/test_results.xlsx
          retention-days: 30

      # ── 13. Show Summary ─────────────────────────────────────────────────────
      - name: Print Test Summary
        if: always()
        run: |
          echo "## BreathTrack E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏃 Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Total Test Cases | 105 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the **breathtrack-e2e-report** artifact above to view the detailed Excel report." >> $GITHUB_STEP_SUMMARY
